<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON VPN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, sans-serif;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: #111;
            border: 1px solid #00aaff33;
            border-radius: 32px;
            padding: 30px 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .line {
            position: absolute;
            left: -10%;
            width: 120%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #00aaff33, transparent);
            pointer-events: none;
        }
        .line-top { top: 15%; transform: rotate(-1deg); }
        .line-bottom { bottom: 15%; transform: rotate(1deg); }

        .logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 3px;
            color: #fff;
            position: relative;
            z-index: 2;
        }
        .logo span { color: #00aaff; text-shadow: 0 0 30px rgba(0, 170, 255, 0.3); }
        .sub {
            color: #666;
            font-size: 13px;
            margin-top: 4px;
            letter-spacing: 1px;
            position: relative;
            z-index: 2;
        }

        .ip-info {
            background: #1a1a1a;
            border: 1px solid #00aaff11;
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 24px;
            font-size: 14px;
            color: #888;
            position: relative;
            z-index: 2;
        }
        .ip-info span { color: #00aaff; font-weight: 600; }

        .plans {
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
            z-index: 2;
        }
        .plan {
            background: #1a1a1a;
            border: 1px solid #00aaff11;
            border-radius: 16px;
            padding: 16px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }
        .plan:hover {
            border-color: #00aaff44;
            background: #1f1f1f;
        }
        .plan .info {
            text-align: left;
        }
        .plan .name {
            font-weight: 600;
            color: #fff;
            font-size: 15px;
        }
        .plan .price {
            font-size: 13px;
            color: #00aaff;
            margin-top: 2px;
        }
        .plan .pay-link {
            background: #00aaff22;
            border: 1px solid #00aaff44;
            border-radius: 12px;
            padding: 8px 18px;
            color: #fff;
            font-weight: 600;
            font-size: 13px;
            text-decoration: none;
            transition: 0.3s;
            white-space: nowrap;
        }
        .plan .pay-link:hover {
            background: #00aaff33;
            border-color: #00aaff66;
        }

        .secure {
            color: #444;
            font-size: 12px;
            margin-top: 24px;
            position: relative;
            z-index: 2;
        }
        .secure span { color: #00cc44; }

        .footer {
            color: #222;
            font-size: 9px;
            margin-top: 18px;
            letter-spacing: 2px;
            position: relative;
            z-index: 2;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="line line-top"></div>
    <div class="line line-bottom"></div>

    <div class="logo"><span>✦</span> NEON <span>VPN</span></div>
    <div class="sub">Оплата подписки</div>

    <div class="ip-info">
        🌐 Ваш IP: <span id="userIp">Определяется...</span>
    </div>

    <div class="plans">
        <div class="plan">
            <div class="info">
                <div class="name">1 месяц</div>
                <div class="price">170 ₽</div>
            </div>
            <a class="pay-link" href="https://t.me/tribute/app?startapp=pzSp" target="_blank">ОПЛАТИТЬ</a>
        </div>

        <div class="plan">
            <div class="info">
                <div class="name">3 месяца</div>
                <div class="price">450 ₽</div>
            </div>
            <a class="pay-link" href="https://t.me/tribute/app?startapp=pzSq" target="_blank">ОПЛАТИТЬ</a>
        </div>

        <div class="plan">
            <div class="info">
                <div class="name">6 месяцев</div>
                <div class="price">750 ₽</div>
            </div>
            <a class="pay-link" href="https://t.me/tribute/app?startapp=pzSr" target="_blank">ОПЛАТИТЬ</a>
        </div>

        <div class="plan">
            <div class="info">
                <div class="name">12 месяцев</div>
                <div class="price">1100 ₽</div>
            </div>
            <a class="pay-link" href="https://t.me/tribute/app?startapp=pzSt" target="_blank">ОПЛАТИТЬ</a>
        </div>
    </div>

    <div class="secure">
        🔒 Данные защищены
    </div>

    <div class="footer">NEON VPN © 2026</div>
</div>

<script>
    fetch('https://api.ipify.org?format=json')
        .then(response => response.json())
        .then(data => {
            document.getElementById('userIp').textContent = data.ip;
        })
        .catch(() => {
            document.getElementById('userIp').textContent = 'Не удалось определить';
        });
</script>

</body>
</html>
