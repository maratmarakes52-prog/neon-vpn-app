<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON VPN</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            touch-action: pan-y;
            -webkit-text-size-adjust: 100%;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 16px;
            font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, sans-serif;
            color: #fff;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: -30%;
            width: 160%;
            height: 160%;
            background: radial-gradient(ellipse at 20% 20%, rgba(0, 100, 255, 0.08), transparent 60%),
                        radial-gradient(ellipse at 80% 80%, rgba(0, 150, 255, 0.05), transparent 50%);
            z-index: 0;
            pointer-events: none;
        }
        .container {
            max-width: 420px;
            width: 100%;
            background: rgba(10, 10, 10, 0.92);
            border: 1px solid rgba(0, 100, 255, 0.15);
            border-radius: 32px;
            padding: 24px 18px 30px;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(4px);
            box-shadow: 0 20px 60px rgba(0, 100, 255, 0.05);
        }
        .line {
            position: absolute;
            left: -5%;
            width: 110%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 100, 255, 0.2), transparent);
            pointer-events: none;
        }
        .line-top { top: 18%; transform: rotate(-2deg); }
        .line-bottom { bottom: 12%; transform: rotate(2deg); }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            position: relative;
            z-index: 2;
        }
        .logo { font-size: 22px; font-weight: 800; letter-spacing: 1px; color: #fff; }
        .logo span { color: #00aaff; text-shadow: 0 0 30px rgba(0, 170, 255, 0.3); }
        .badge {
            background: rgba(0, 170, 255, 0.1);
            border: 1px solid rgba(0, 170, 255, 0.2);
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 10px;
            color: #00aaff;
            letter-spacing: 1px;
        }

        .user-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(0, 170, 255, 0.08);
            border-radius: 16px;
            padding: 14px 16px;
            margin-bottom: 18px;
            position: relative;
            z-index: 2;
        }
        .user-card .row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 13px;
            color: #aaa;
        }
        .user-card .row .value { color: #fff; font-weight: 600; }
        .user-card .row .value.green { color: #00cc44; }
        .user-card .row .value.red { color: #ff4444; }
        .user-card .row .value.blue { color: #00aaff; }

        .section-title {
            color: #666;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 16px 0 10px;
            position: relative;
            z-index: 2;
        }

        .plan {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(0, 170, 255, 0.08);
            border-radius: 16px;
            padding: 14px 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            z-index: 2;
        }
        .plan:hover { border-color: rgba(0, 170, 255, 0.3); background: rgba(0, 170, 255, 0.03); }
        .plan.active { border-color: #00aaff; background: rgba(0, 170, 255, 0.06); }
        .plan .info .name { font-weight: 600; color: #fff; font-size: 14px; }
        .plan .info .price { font-size: 13px; color: #00aaff; margin-top: 2px; }
        .plan .radio {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .plan .radio.active { border-color: #00aaff; background: #00aaff; }
        .plan .radio.active::after {
            content: '✓';
            color: #000;
            font-size: 14px;
            font-weight: 700;
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #0055cc, #00aaff);
            border: none;
            border-radius: 20px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            z-index: 2;
            margin-top: 6px;
        }
        .btn-primary:disabled { opacity: 0.5; }
        .btn-primary:active { transform: scale(0.97); }

        .btn-secondary {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid rgba(0, 170, 255, 0.2);
            border-radius: 20px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            z-index: 2;
            margin-top: 8px;
        }
        .btn-secondary:hover { border-color: rgba(0, 170, 255, 0.4); background: rgba(0, 170, 255, 0.05); }

        .footer {
            text-align: center;
            color: #222;
            font-size: 9px;
            margin-top: 18px;
            letter-spacing: 2px;
            position: relative;
            z-index: 2;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #000000dd;
            backdrop-filter: blur(12px);
            padding: 14px 24px;
            border-radius: 18px;
            color: #fff;
            font-size: 14px;
            z-index: 999;
            opacity: 0;
            transition: 0.4s;
            max-width: 90%;
            text-align: center;
        }
        .toast.show { opacity: 1; bottom: 40px; }

        .confirm-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(12px);
            z-index: 99999;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }
        .confirm-overlay.show { display: flex; }
        .confirm-box {
            background: #1a1a1a;
            border: 1px solid rgba(0, 170, 255, 0.2);
            border-radius: 32px;
            padding: 28px 24px 30px;
            max-width: 380px;
            width: 100%;
        }
        .confirm-box .title { font-size: 20px; font-weight: 700; text-align: center; color: #fff; }
        .confirm-box .subtitle { text-align: center; color: #888; font-size: 12px; margin-bottom: 18px; }
        .confirm-box .line { height: 1px; background: rgba(0, 170, 255, 0.1); margin: 10px 0; }
        .confirm-box .row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; }
        .confirm-box .row .label { color: #666; }
        .confirm-box .row .value { color: #fff; font-weight: 600; }
        .confirm-box .row .value.blue { color: #00aaff; }
        .confirm-box .total {
            background: rgba(0, 170, 255, 0.05);
            border: 1px solid rgba(0, 170, 255, 0.1);
            border-radius: 14px;
            padding: 12px 16px;
            margin: 14px 0 18px;
            text-align: center;
        }
        .confirm-box .total .price { font-size: 28px; font-weight: 800; color: #00aaff; }
        .confirm-box .total .price span { font-size: 16px; font-weight: 400; color: #888; }
        .confirm-box .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .confirm-box .btn-cancel {
            padding: 16px;
            border-radius: 18px;
            border: 1px solid #333;
            background: transparent;
            color: #888;
            font-weight: 600;
            cursor: pointer;
        }
        .confirm-box .btn-confirm {
            padding: 16px;
            border-radius: 18px;
            border: none;
            background: linear-gradient(135deg, #0055cc, #00aaff);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="line line-top"></div>
    <div class="line line-bottom"></div>

    <div class="header">
        <div class="logo"><span>✦</span> NEON <span>VPN</span></div>
        <div class="badge">v2.0</div>
    </div>

    <div class="user-card">
        <div class="row"><span>👤 Пользователь</span><span class="value" id="userName">—</span></div>
        <div class="row"><span>📅 Статус</span><span class="value red" id="userStatus">Неактивен</span></div>
        <div class="row"><span>⏳ До</span><span class="value" id="userExpiry">—</span></div>
    </div>

    <div class="section-title">💎 ВЫБЕРИ ТАРИФ</div>
    <div id="plans"></div>

    <button class="btn-primary" id="buyBtn">КУПИТЬ ПОДПИСКУ</button>
    <button class="btn-secondary" id="connectBtn">📱 ПОДКЛЮЧИТЬ УСТРОЙСТВО</button>

    <div class="footer">NEON VPN © 2026</div>
</div>

<div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
        <div class="title">🔐 ПОДТВЕРЖДЕНИЕ</div>
        <div class="subtitle">Проверьте данные перед оплатой</div>
        <div class="line"></div>
        <div class="row"><span class="label">📅 Тариф</span><span class="value" id="cPlan">—</span></div>
        <div class="row"><span class="label">💰 Цена</span><span class="value blue" id="cPrice">—</span></div>
        <div class="row"><span class="label">💳 Оплата</span><span class="value blue" id="cPayType">Рубли</span></div>
        <div class="line"></div>
        <div class="total">
            <div style="color:#888;font-size:12px;">ИТОГО</div>
            <div class="price"><span id="cTotal">0</span> <span>₽</span></div>
        </div>
        <div class="btn-group">
            <button class="btn-cancel" id="cancelBtn">❌ НАЗАД</button>
            <button class="btn-confirm" id="confirmBtn">✅ ОПЛАТИТЬ</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const PLANS = [
        { id: '1m', name: '1 месяц', price_rub: 170, price_stars: 150, days: 30 },
        { id: '3m', name: '3 месяца', price_rub: 450, price_stars: 400, days: 90 },
        { id: '6m', name: '6 месяцев', price_rub: 750, price_stars: 650, days: 180 },
        { id: '12m', name: '12 месяцев', price_rub: 1100, price_stars: 950, days: 365 },
    ];

    let selectedPlan = null;
    let toastTimer = null;

    const user = tg.initDataUnsafe?.user || { id: '7481288398', username: 'neon_user' };
    document.getElementById('userName').textContent = user.username || 'tg' + user.id;

    function renderPlans() {
        const container = document.getElementById('plans');
        container.innerHTML = '';
        PLANS.forEach(p => {
            const div = document.createElement('div');
            div.className = 'plan';
            div.dataset.id = p.id;
            div.innerHTML = `
                <div class="info">
                    <div class="name">${p.name}</div>
                    <div class="price">${p.price_rub} ₽ / ${p.price_stars} ⭐</div>
                </div>
                <div class="radio"></div>
            `;
            div.addEventListener('click', function() {
                document.querySelectorAll('.plan').forEach(el => el.classList.remove('active'));
                document.querySelectorAll('.plan .radio').forEach(el => el.classList.remove('active'));
                this.classList.add('active');
                this.querySelector('.radio').classList.add('active');
                selectedPlan = this.dataset.id;
                document.getElementById('buyBtn').disabled = false;
                showToast(`✅ Выбран тариф: ${PLANS.find(p => p.id === selectedPlan).name}`);
            });
            container.appendChild(div);
        });
    }

    function showToast(msg, duration = 3000) {
        if (toastTimer) clearTimeout(toastTimer);
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        toastTimer = setTimeout(() => toast.classList.remove('show'), duration);
    }

    document.getElementById('buyBtn').addEventListener('click', function() {
        if (!selectedPlan) {
            showToast('❌ Выберите тариф');
            return;
        }
        const plan = PLANS.find(p => p.id === selectedPlan);
        document.getElementById('cPlan').textContent = plan.name;
        document.getElementById('cPrice').textContent = plan.price_rub + ' ₽';
        document.getElementById('cTotal').textContent = plan.price_rub;
        document.getElementById('confirmOverlay').classList.add('show');
    });

    document.getElementById('cancelBtn').addEventListener('click', function() {
        document.getElementById('confirmOverlay').classList.remove('show');
    });

    document.getElementById('confirmBtn').addEventListener('click', function() {
        document.getElementById('confirmOverlay').classList.remove('show');
        showToast('🔗 Перенаправление в Tribute...', 3000);
        const plan = PLANS.find(p => p.id === selectedPlan);
        const links = {
            '1m': 'https://web.tribute.tg/p/zSp',
            '3m': 'https://web.tribute.tg/p/zSq',
            '6m': 'https://web.tribute.tg/p/zSr',
            '12m': 'https://web.tribute.tg/p/zSt'
        };
        setTimeout(() => {
            tg.openTelegramLink(links[selectedPlan]);
        }, 1000);
    });

    document.getElementById('connectBtn').addEventListener('click', function() {
        showToast('📱 Раздел подключения скоро будет', 3000);
    });

    renderPlans();
    document.getElementById('buyBtn').disabled = true;
</script>
</body>
</html>
